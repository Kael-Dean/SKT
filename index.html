    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy (client-side baseline via <meta>).
      NOTE: this is a first layer. Headers like X-Frame-Options,
      X-Content-Type-Options(nosniff) and HSTS cannot be set via <meta> and
      must be configured on the host/CDN — see SECURITY-NOTES.md.
      connect-src lists the known API origins + local dev; img-src allows
      https/data/blob for avatars & generated previews. Verify in DevTools
      console (no CSP violations) before deploying.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.amcsurin.com https://um-repo-243977022740.asia-southeast1.run.app https://*.run.app http://localhost:8000 http://127.0.0.1:8000; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    />
    <title>สหกรณ์การเกษตร SKT สุรินทร์</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
